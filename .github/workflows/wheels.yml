name: Wheels

# Two-stage pipeline:
#   1. `rust-build`  — per-target static lib + diplomat-generated C++
#                       headers. Python-version-agnostic; cacheable.
#   2. `wheels`      — per-target cibuildwheel run. Fans out to every
#                       supported Python version internally. Downloads
#                       the Stage 1 artifact for its target so no Rust
#                       toolchain is needed in this job.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "bindings/python/**"
      - "crates/xex2-ffi/**"
      - "crates/xex2/**"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Stage 1: Build Rust artifacts (static lib + generated headers).
  # One job per target. Output is packaged into an artifact Stage 2
  # can drop into place.
  # ────────────────────────────────────────────────────────────────────
  rust-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            artifact: linux_x86_64
          # Single macos-14 (arm64 host) cross-compiles for both
          # aarch64 and x86_64, lipo's the result into a fat static
          # archive, and feeds it into a universal2 wheel. macos-13
          # (Intel) hosted runners have been effectively deprecated
          # and reliably fail to pick up jobs.
          - os: macos-14
            artifact: macos_universal2
          - os: windows-2022
            artifact: windows_x86_64
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      # manylinux images ship without Rust; install it in-container.
      # macOS/Windows use the action for hosted runners.
      - name: Install Rust (manylinux container)
        if: matrix.container != ''
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust (hosted runner)
        if: matrix.container == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Segment the cache per target so the linux-manylinux,
          # macos-arm, macos-x86, and windows archives don't fight over
          # the same key.
          shared-key: ${{ matrix.artifact }}

      - name: Install diplomat-tool
        run: cargo install diplomat-tool --version '^0.15' --locked

      # On macOS we cross-compile to both aarch64 and x86_64, then
      # merge the two thin static archives into one universal (fat)
      # archive. The wheel stage produces a single universal2 wheel
      # covering Apple Silicon and Intel Macs with one artifact.
      # Other platforms use cargo's default host-target build.
      - name: Add macOS x86_64 target
        if: matrix.os == 'macos-14'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build xex2-ffi (static, universal on macOS)
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-14" ]]; then
              cargo build -p xex2-ffi --release --target aarch64-apple-darwin
              cargo build -p xex2-ffi --release --target x86_64-apple-darwin
              mkdir -p target/release
              lipo -create \
                  target/aarch64-apple-darwin/release/libxex2_ffi.a \
                  target/x86_64-apple-darwin/release/libxex2_ffi.a \
                  -output target/release/libxex2_ffi.a
              lipo -info target/release/libxex2_ffi.a
          else
              cargo build -p xex2-ffi --release
          fi

      - name: Generate C++ bindings
        shell: bash
        run: |
          diplomat-tool cpp crates/xex2-ffi/bindings/cpp \
              --entry crates/xex2-ffi/src/lib.rs

      - name: Stage artifact directory
        shell: bash
        run: |
          mkdir -p rust-artifacts/target/release
          mkdir -p rust-artifacts/crates/xex2-ffi/bindings
          # .a on unix, .lib on windows — just glob what cargo emits.
          cp target/release/*xex2_ffi* rust-artifacts/target/release/ 2>/dev/null || true
          cp -r crates/xex2-ffi/bindings/cpp rust-artifacts/crates/xex2-ffi/bindings/cpp
          ls -la rust-artifacts/target/release/
          ls rust-artifacts/crates/xex2-ffi/bindings/cpp/ | head

      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.artifact }}
          path: rust-artifacts/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # Stage 2: cibuildwheel per target, iterating Python versions.
  # No Rust toolchain needed in this job — artifacts from Stage 1 are
  # dropped into their workspace-relative locations before cibuildwheel
  # runs.
  # ────────────────────────────────────────────────────────────────────
  wheels:
    needs: rust-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux_x86_64
          - os: macos-14
            artifact: macos_universal2
          - os: windows-2022
            artifact: windows_x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-${{ matrix.artifact }}
          # Extract at the workspace root so target/release/libxex2_ffi.a
          # and crates/xex2-ffi/bindings/cpp/ land where CMakeLists.txt
          # expects them.
          path: .

      - name: Verify artifacts in place
        shell: bash
        run: |
          ls -la target/release/ | head
          ls crates/xex2-ffi/bindings/cpp/ | head

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.artifact }}
          path: wheelhouse/*.whl
