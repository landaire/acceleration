[package]
name = "stfs"
version = "0.1.0"
edition = "2021"

[dependencies]
sha-1 = "0.10.0"
#rsa = "0.5.0"
vfs = "0.12"

thiserror = "1.0"
bitflags = "1.3"
chrono = { version = "0.4", features = ["serde", "wasmbind"] }
serde = { version = "1.0", features = ["derive", "rc"] }
binrw = "0.13"
variantly = "0.4"
parking_lot = { version = "0.12", features = ["serde"] }
modular-bitfield = "0.11"
[patch.crates-io]
