[package]
name = "acceleration_cli"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[[bin]]
name = "acceleration"
path = "src/main.rs"

[dependencies]
memmap = "0.7"
clap = { version = "4.5.4", features = ["derive"]}
structopt = "0.3"
anyhow = "1.0"
serde = { version = "1.0" }
stfs = { version = "0.1", path = "../stfs" }
bytes = "1.6"
chrono = "0.4.38"
