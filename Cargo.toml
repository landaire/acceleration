[workspace]
members = ['cli', 'stfs', 'stfs_old', 'ui', "xcontent", "xecrypt", "xex2", "xex2ool"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
byteorder = "1.4"
num_enum = "0.5"
bitflags = "2.5"
sha-1 = "0.10.0"
vfs = "0.13"
anyhow = "1.0"
futures = "0.3"
async-trait = "0.1"
base64 = "0.22"
insta = { version = "1", features = ["toml"] }
fskit = { version = "0.2", path = "../fskit", features = ["vfs"] }
